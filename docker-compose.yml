version: '3.8'

networks:
  archflow-network:
    driver: bridge
    name: archflow-network

volumes:
  archflow-postgres-data:
  archflow-redis-data:
  archflow-minio-data:

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  archflow-postgres:
    image: postgres:16-alpine
    container_name: archflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archflow}
      POSTGRES_USER: ${POSTGRES_USER:-archflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StrongPassword123}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - archflow-postgres-data:/var/lib/postgresql/data
    networks:
      - archflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archflow} -d ${POSTGRES_DB:-archflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  archflow-redis:
    image: redis:7-alpine
    container_name: archflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - archflow-redis-data:/data
    networks:
      - archflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  archflow-minio:
    image: minio/minio:latest
    container_name: archflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-StrongPassword123}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - archflow-minio-data:/data
    networks:
      - archflow-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  archflow-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: archflow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@archflow.ai
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:-StrongPassword123}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - archflow-network
    logging: *default-logging

  archflow-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: archflow-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8081}:8081"
    volumes:
      - ./server/data:/app/data
    networks:
      - archflow-network
    logging: *default-logging

  archflow-ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: archflow-ai
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    environment:
      - SERVER_URL=http://archflow-server:${SERVER_PORT:-8081}
    networks:
      - archflow-network
    depends_on:
      - archflow-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${AI_SERVICE_PORT:-8000}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  archflow-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: archflow-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8082}:8080"
    networks:
      - archflow-network
    depends_on:
      - archflow-server
    logging: *default-logging

  archflow-nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: archflow-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:8080"
    networks:
      - archflow-network
    depends_on:
      - archflow-client
      - archflow-server
      - archflow-ai
    logging: *default-logging
