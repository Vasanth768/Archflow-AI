services:
  # Client static server (Nginx + Reverse Proxy)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - server

  # Server database API service (Spring Boot + H2)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      # Mount data folder for H2 database persistence on the host
      - ./server/data:/app/data
